- actionId: send_dm
  label: Send Direct Message
  categories:
    - messaging
  actionType: create
  description: Send a direct message to a specific user by opening a conversation and posting a message
  details: Opens a DM channel with the specified user (or reuses existing one) and sends a message. Requires im:write and chat:write scopes.
  resources: https://docs.slack.dev/reference/methods/chat.postMessage
  entrypointUrl: /chat.postMessage
  entrypointHttpMethod: post
  inputs:
    - name: userId
      description: The Slack user ID to send the direct message to (e.g., U0123456789).
      type: string
      in: body
      required: true
    - name: text
      description: The message text to send. Required unless blocks or attachments are provided.
      type: string
      in: body
      required: false
    - name: blocks
      description: Array of Block Kit blocks for rich message formatting. When provided, text becomes a fallback for notifications.
      type: object
      in: body
      required: false
    - name: attachments
      description: Array of legacy attachment objects for message formatting.
      type: object
      in: body
      required: false
    - name: unfurlLinks
      description: Enable or disable URL unfurling in the message.
      type: boolean
      in: body
      required: false
    - name: unfurlMedia
      description: Enable or disable media unfurling in the message.
      type: boolean
      in: body
      required: false
  steps:
    - stepId: open_conversation
      description: Open or retrieve existing DM channel with the user
      stepFunction:
        functionName: request
        parameters:
          url: /conversations.open
          method: post
          args:
            - name: Content-Type
              value: application/json; charset=utf-8
              in: headers
            - name: users
              value: $.inputs.userId
              in: body
          response:
            collection: false
    - stepId: send_message
      description: Send the message to the DM channel
      stepFunction:
        functionName: request
        parameters:
          url: /chat.postMessage
          method: post
          args:
            - name: Content-Type
              value: application/json; charset=utf-8
              in: headers
            - name: channel
              value: $.steps.open_conversation.output.data.channel.id
              in: body
            - name: text
              value: $.inputs.text
              in: body
              condition: "{{present(inputs.text)}}"
            - name: blocks
              value: $.inputs.blocks
              in: body
              condition: "{{present(inputs.blocks)}}"
            - name: attachments
              value: $.inputs.attachments
              in: body
              condition: "{{present(inputs.attachments)}}"
            - name: unfurl_links
              value: $.inputs.unfurlLinks
              in: body
              condition: "{{present(inputs.unfurlLinks)}}"
            - name: unfurl_media
              value: $.inputs.unfurlMedia
              in: body
              condition: "{{present(inputs.unfurlMedia)}}"
          response:
            collection: false
  result:
    data: $.steps.send_message.output.data

- actionId: send_message
  label: Send Message
  categories:
    - messaging
  actionType: create
  description: Send a message to any channel, group, or existing DM conversation
  details: Posts a message to the specified channel. Can be used with channel IDs, group IDs, or DM channel IDs. Requires chat:write scope.
  resources: https://docs.slack.dev/reference/methods/chat.postMessage
  entrypointUrl: /chat.postMessage
  entrypointHttpMethod: post
  inputs:
    - name: channel
      description: The channel ID, group ID, or DM channel ID to send the message to.
      type: string
      in: body
      required: true
    - name: text
      description: The message text to send. Required unless blocks or attachments are provided.
      type: string
      in: body
      required: false
    - name: blocks
      description: Array of Block Kit blocks for rich message formatting.
      type: object
      in: body
      required: false
    - name: attachments
      description: Array of legacy attachment objects for message formatting.
      type: object
      in: body
      required: false
    - name: threadTs
      description: Timestamp of the parent message to reply in a thread.
      type: string
      in: body
      required: false
    - name: replyBroadcast
      description: When replying to a thread, also post the reply to the channel.
      type: boolean
      in: body
      required: false
    - name: unfurlLinks
      description: Enable or disable URL unfurling in the message.
      type: boolean
      in: body
      required: false
    - name: unfurlMedia
      description: Enable or disable media unfurling in the message.
      type: boolean
      in: body
      required: false
    - name: mrkdwn
      description: Enable or disable Slack markdown parsing in the message.
      type: boolean
      in: body
      required: false
  steps:
    - stepId: post_message
      description: Post message to the specified channel
      stepFunction:
        functionName: request
        parameters:
          url: /chat.postMessage
          method: post
          args:
            - name: Content-Type
              value: application/json; charset=utf-8
              in: headers
            - name: channel
              value: $.inputs.channel
              in: body
            - name: text
              value: $.inputs.text
              in: body
              condition: "{{present(inputs.text)}}"
            - name: blocks
              value: $.inputs.blocks
              in: body
              condition: "{{present(inputs.blocks)}}"
            - name: attachments
              value: $.inputs.attachments
              in: body
              condition: "{{present(inputs.attachments)}}"
            - name: thread_ts
              value: $.inputs.threadTs
              in: body
              condition: "{{present(inputs.threadTs)}}"
            - name: reply_broadcast
              value: $.inputs.replyBroadcast
              in: body
              condition: "{{present(inputs.replyBroadcast)}}"
            - name: unfurl_links
              value: $.inputs.unfurlLinks
              in: body
              condition: "{{present(inputs.unfurlLinks)}}"
            - name: unfurl_media
              value: $.inputs.unfurlMedia
              in: body
              condition: "{{present(inputs.unfurlMedia)}}"
            - name: mrkdwn
              value: $.inputs.mrkdwn
              in: body
              condition: "{{present(inputs.mrkdwn)}}"
          response:
            collection: false
  result:
    data: $.steps.post_message.output.data

- actionId: open_conversation
  label: Open Conversation
  categories:
    - messaging
  actionType: create
  description: Open or resume a direct message or multi-person direct message conversation
  details: Creates or retrieves an existing DM channel with the specified users. Use one user ID for a DM, multiple (2-8) for a group DM. Requires im:write or mpim:write scope.
  resources: https://docs.slack.dev/reference/methods/conversations.open
  entrypointUrl: /conversations.open
  entrypointHttpMethod: post
  inputs:
    - name: users
      description: Comma-separated list of user IDs (1-8 users). One user creates a DM, multiple creates a group DM.
      type: string
      in: body
      required: true
    - name: returnIm
      description: Return full conversation object instead of just the channel ID.
      type: boolean
      in: body
      required: false
    - name: preventCreation
      description: Check if a DM exists without creating one if it does not.
      type: boolean
      in: body
      required: false
  steps:
    - stepId: open_dm
      description: Open or retrieve the DM conversation
      stepFunction:
        functionName: request
        parameters:
          url: /conversations.open
          method: post
          args:
            - name: Content-Type
              value: application/json; charset=utf-8
              in: headers
            - name: users
              value: $.inputs.users
              in: body
            - name: return_im
              value: $.inputs.returnIm
              in: body
              condition: "{{present(inputs.returnIm)}}"
            - name: prevent_creation
              value: $.inputs.preventCreation
              in: body
              condition: "{{present(inputs.preventCreation)}}"
          response:
            collection: false
  result:
    data: $.steps.open_dm.output.data
