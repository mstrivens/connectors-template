actions:
  - actionId: list_employees
    label: List Employees
    categories:
      - hris
    actionType: custom
    description: Lists all employees with unified schema mapping, returning only the employee ID.
    resources: https://documentation.bamboohr.com/reference/get-employees-directory-1

    cursor:
      enabled: true
      pageSize: 100

    steps:
      - stepId: get_employees
        description: Fetch employees from BambooHR API
        stepFunction:
          functionName: request
          parameters:
            url: /employees/directory
            method: get
            args:
              - name: Accept
                value: application/json
                in: headers

      - stepId: map_employees_data
        description: Map to unified schema
        stepFunction:
          functionName: map_fields
          version: '2'
          parameters:
            fields:
              - targetFieldKey: id
                expression: $.id
                type: string
            dataSource: $.steps.get_employees.output.data.employees

      - stepId: typecast_employees_data
        description: Apply unified types
        stepFunction:
          functionName: typecast
          version: '2'
          parameters:
            fields:
              - targetFieldKey: id
                type: string
            dataSource: $.steps.map_employees_data.output.data

    result:
      data: $.steps.typecast_employees_data.output.data
