- actionId: terminate_employee
  label: Terminate Employee
  categories:
    - hris
  actionType: custom
  description: Terminates an employee in BambooHR by setting their termination date.
  details: BambooHR does not support hard deletion of employee records. This action terminates an employee by setting their terminationDate field. The employee record remains accessible in the system after termination.
  resources: https://documentation.bamboohr.com/reference/update-employee
  inputs:
    - name: id
      description: The BambooHR employee ID
      type: string
      in: path
      required: true
    - name: terminationDate
      description: The termination date in YYYY-MM-DD format
      type: string
      in: body
      required: true
  steps:
    - stepId: terminate_employee
      description: Set termination date on employee record in BambooHR
      stepFunction:
        functionName: request
        parameters:
          url: /employees/${inputs.id}
          method: post
          args:
            - name: Accept
              value: application/json
              in: headers
            - name: Content-Type
              value: application/json
              in: headers
            - name: terminationDate
              value: $.inputs.terminationDate
              in: body
  result:
    data: $.steps.terminate_employee.output.data
